name: 测试每分钟执行

on:
  schedule:
    - cron: '*/2 * * * *'  # 每2分钟执行一次
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 简单测试
        run: |
          echo "测试执行时间: $(TZ='Asia/Shanghai' date)"
          
      - name: 发送飞书通知
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{
              "msg_type": "text",
              "content": {
                "text": "🕐 测试消息\n时间: '"$(TZ='Asia/Shanghai' date '+%H:%M:%S')"'"
              }
            }' \
            ${{ secrets.Smoking }}
