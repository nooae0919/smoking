name: 抽烟时间提醒

on:
  schedule:
    - cron: '* * * * *'  
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: 抽烟时间到
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{
              "msg_type": "interactive",
              "card": {
                "config": {
                  "wide_screen_mode": false
                },
                "header": {
                  "title": {
                    "tag": "plain_text",
                    "content": "⏰ 抽烟时间到"
                  },
                  "template": "orange"
                },
                "elements": [
                  {
                    "tag": "div",
                    "text": {
                      "tag": "lark_md",
                      "content": "**现在是抽烟时间！**\n\n请带上烟和火机，抓紧下楼~"
                    }
                  },
                  {
                    "tag": "hr"
                  },
                  {
                    "tag": "div",
                    "text": {
                      "tag": "lark_md",
                      "content": "叫上你的好朋友~"
                    }
                  },
                  {
                    "tag": "hr"
                  },
                  {
                    "tag": "note",
                    "elements": [
                      {
                        "tag": "plain_text",
                        "content": "新的一天，Smoking！💪"
                      }
                    ]
                  }
                ]
              }
            }' \
            ${{ secrets.Smoking }}
